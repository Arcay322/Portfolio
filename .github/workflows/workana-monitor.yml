name: Workana Smart Monitor 24/7

on:
  schedule:
    # Se ejecuta cada 30 minutos (ajustable)
    - cron: '*/30 * * * *'
  workflow_dispatch: # Permite ejecución manual desde la pestaña Actions en GitHub

jobs:
  monitor:
    runs-on: ubuntu-latest

    permissions:
      contents: write # Requerido para poder hacer push de la caché .seen-projects.json

    steps:
      - name: Checkout Código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Instalar Dependencias
        run: npm ci

      - name: Instalar Playwright Chromium
        run: npx playwright install chromium

      - name: Ejecutar Monitor de Proyectos
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: npx tsx scripts/workana-monitor.ts

      - name: Auto-guardar Caché (.seen-projects.json)
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add .seen-projects.json
          # Solo hacer commit y push si hay cambios reales en la caché
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-update workana projects cache" && git push)
